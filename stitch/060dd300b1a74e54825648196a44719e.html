<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Game Settings - WingLoop Lite</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@600&amp;family=Plus+Jakarta+Sans:wght@500&amp;family=Space+Grotesk:wght@700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                            "surface-container-high": "#212b39",
                            "surface-tint": "#adc6ff",
                            "background": "#091421",
                            "on-primary-fixed": "#001a42",
                            "on-error-container": "#ffdad6",
                            "tertiary-fixed-dim": "#ffb95f",
                            "on-primary-fixed-variant": "#004395",
                            "surface-container-highest": "#2b3544",
                            "error-container": "#93000a",
                            "surface-container-lowest": "#050f1c",
                            "on-tertiary-fixed": "#2a1700",
                            "on-background": "#d9e3f6",
                            "tertiary-fixed": "#ffddb8",
                            "on-surface": "#d9e3f6",
                            "secondary-container": "#00a572",
                            "tertiary": "#ffb95f",
                            "tertiary-container": "#ca8100",
                            "inverse-primary": "#005ac2",
                            "secondary": "#4edea3",
                            "outline-variant": "#424754",
                            "surface": "#091421",
                            "outline": "#8c909f",
                            "on-secondary-container": "#00311f",
                            "inverse-surface": "#d9e3f6",
                            "error": "#ffb4ab",
                            "on-primary-container": "#00285d",
                            "primary": "#adc6ff",
                            "primary-container": "#4d8eff",
                            "on-surface-variant": "#c2c6d6",
                            "secondary-fixed-dim": "#4edea3",
                            "surface-dim": "#091421",
                            "surface-container-low": "#121c2a",
                            "inverse-on-surface": "#27313f",
                            "on-primary": "#002e6a",
                            "surface-variant": "#2b3544",
                            "on-secondary-fixed": "#002113",
                            "primary-fixed": "#d8e2ff",
                            "on-error": "#690005",
                            "surface-container": "#16202e",
                            "on-tertiary": "#472a00",
                            "on-tertiary-fixed-variant": "#653e00",
                            "on-secondary-fixed-variant": "#005236",
                            "on-tertiary-container": "#3e2400",
                            "secondary-fixed": "#6ffbbe",
                            "primary-fixed-dim": "#adc6ff",
                            "on-secondary": "#003824",
                            "surface-bright": "#303a48"
                    },
                    "borderRadius": {
                            "DEFAULT": "0.25rem",
                            "lg": "0.5rem",
                            "xl": "0.75rem",
                            "full": "9999px"
                    },
                    "spacing": {
                            "element-gap": "16px",
                            "container-padding": "24px",
                            "unit": "8px",
                            "safe-margin": "32px"
                    },
                    "fontFamily": {
                            "body-md": ["Plus Jakarta Sans"],
                            "display-score": ["Space Grotesk"],
                            "headline-lg": ["Space Grotesk"],
                            "headline-lg-mobile": ["Space Grotesk"],
                            "label-mono": ["JetBrains Mono"]
                    },
                    "fontSize": {
                            "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "500"}],
                            "display-score": ["72px", {"lineHeight": "1.0", "letterSpacing": "-0.04em", "fontWeight": "700"}],
                            "headline-lg": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                            "headline-lg-mobile": ["24px", {"lineHeight": "1.2", "fontWeight": "700"}],
                            "label-mono": ["14px", {"lineHeight": "1.0", "fontWeight": "600"}]
                    }
                }
            }
        }
    </script>
<style>
        .bezel-effect {
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.1);
        }
        .glow-active {
            box-shadow: 0px 4px 20px rgba(173, 198, 255, 0.3); /* using primary tint */
        }
        .btn-tactile {
            border-bottom: 4px solid #00285d; /* on-primary-container approximation */
            transition: transform 0.1s, border-bottom-width 0.1s;
        }
        .btn-tactile:active {
            transform: translateY(2px);
            border-bottom-width: 2px;
        }
        .btn-tactile-secondary {
            border-bottom: 4px solid #2b3544; /* surface-variant */
            transition: transform 0.1s, border-bottom-width 0.1s;
        }
        .btn-tactile-secondary:active {
            transform: translateY(2px);
            border-bottom-width: 2px;
        }
        .btn-tactile-danger {
            border-bottom: 4px solid #690005; /* on-error */
            transition: transform 0.1s, border-bottom-width 0.1s;
        }
        .btn-tactile-danger:active {
            transform: translateY(2px);
            border-bottom-width: 2px;
        }
    </style>
</head>
<body class="bg-background text-on-surface h-screen w-screen overflow-hidden flex items-center justify-center relative font-body-md text-body-md">
<!-- Simulated Gameplay Background -->
<div class="absolute inset-0 z-0 opacity-40 blur-sm" data-alt="A retro 8-bit style arcade game background featuring neon lines and a grid over a dark void, reminiscent of classic arcade games. Deep deep charcoal background with electric blue and bright yellow accents. Luminous, high contrast, modern-retro aesthetic." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuC-og43enzfYx57NH1OpngyPwOOvHysgK2dTyuhfFuYAqzi8tyo3R1o269fD0xPTRGHo49fU9KHWNWOtIwtH5pSnKYFQXh0S56fvFxxcNCXBmvJVpAC23jMVqofulxpwNGzC1bsblHXHbdSb5YJWqNvJkS6fNUYJ6_cry0_XIxH05_fiHCuzkWAEfMZOeMS4RjJoUw6y-nOEaCZcdjhHaNHPrRiZ5Z73O_ifRtu3xCjlPB6oJEJEkf1WvzJo2T6lR4NFP1NtLLAIKOD'); background-size: cover; background-position: center;"></div>
<!-- Modal Container -->
<main class="relative z-10 w-[90%] max-w-md bg-surface-container-high rounded-lg bezel-effect p-container-padding flex flex-col gap-element-gap shadow-2xl">
<!-- Header -->
<header class="text-center mb-unit">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary tracking-tighter italic">Settings</h1>
</header>
<!-- Settings Content -->
<div class="flex flex-col gap-container-padding overflow-y-auto max-h-[614px] pr-2 custom-scrollbar">
<!-- Difficulty Segment -->
<section class="flex flex-col gap-unit">
<label class="font-label-mono text-label-mono text-on-surface-variant uppercase">Difficulty</label>
<div class="flex bg-surface rounded-DEFAULT p-1 bezel-effect">
<button class="flex-1 py-2 text-center rounded-sm font-label-mono text-label-mono text-on-surface-variant hover:text-on-surface transition-colors">Easy</button>
<button class="flex-1 py-2 text-center rounded-sm font-label-mono text-label-mono bg-primary-container/20 text-primary glow-active transition-all">Normal</button>
<button class="flex-1 py-2 text-center rounded-sm font-label-mono text-label-mono text-on-surface-variant hover:text-on-surface transition-colors">Hard</button>
</div>
</section>
<!-- Speed Segment -->
<section class="flex flex-col gap-unit">
<label class="font-label-mono text-label-mono text-on-surface-variant uppercase">Speed</label>
<div class="flex bg-surface rounded-DEFAULT p-1 bezel-effect">
<button class="flex-1 py-2 text-center rounded-sm font-label-mono text-label-mono text-on-surface-variant hover:text-on-surface transition-colors">Slow</button>
<button class="flex-1 py-2 text-center rounded-sm font-label-mono text-label-mono bg-primary-container/20 text-primary glow-active transition-all">Normal</button>
<button class="flex-1 py-2 text-center rounded-sm font-label-mono text-label-mono text-on-surface-variant hover:text-on-surface transition-colors">Fast</button>
</div>
</section>
<!-- Audio Toggles -->
<section class="flex flex-col gap-element-gap">
<label class="font-label-mono text-label-mono text-on-surface-variant uppercase mb-[-8px]">Audio</label>
<div class="flex justify-between items-center bg-surface-container-highest p-3 rounded-DEFAULT bezel-effect">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary">music_note</span>
<span class="font-body-md text-body-md">Music</span>
</div>
<button aria-pressed="true" class="w-12 h-6 rounded-full bg-primary relative transition-colors focus:outline-none">
<div class="absolute right-1 top-1 w-4 h-4 bg-on-primary rounded-full transition-transform"></div>
</button>
</div>
<div class="flex justify-between items-center bg-surface-container-highest p-3 rounded-DEFAULT bezel-effect">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary">volume_up</span>
<span class="font-body-md text-body-md">SFX</span>
</div>
<button aria-pressed="true" class="w-12 h-6 rounded-full bg-primary relative transition-colors focus:outline-none">
<div class="absolute right-1 top-1 w-4 h-4 bg-on-primary rounded-full transition-transform"></div>
</button>
</div>
</section>
<!-- Input Help -->
<section class="flex flex-col gap-unit bg-surface-container-lowest p-3 rounded-DEFAULT bezel-effect">
<label class="font-label-mono text-label-mono text-tertiary uppercase flex items-center gap-2">
<span class="material-symbols-outlined text-[16px]">keyboard</span> Input Help
                </label>
<div class="flex flex-col gap-2">
<div class="flex justify-between text-sm">
<span class="text-on-surface-variant">Space / Click</span>
<span class="font-label-mono text-primary">FLAP</span>
</div>
<div class="flex justify-between text-sm">
<span class="text-on-surface-variant">P Key</span>
<span class="font-label-mono text-primary">PAUSE</span>
</div>
</div>
</section>
<!-- Danger Zone -->
<section class="flex justify-center mt-2">
<button class="bg-error-container text-on-error-container font-label-mono text-label-mono py-2 px-4 rounded-DEFAULT btn-tactile-danger flex items-center gap-2 hover:bg-error hover:text-on-error transition-colors">
<span class="material-symbols-outlined text-[16px]">delete</span> Reset High Score
                </button>
</section>
</div>
<!-- Actions -->
<footer class="flex flex-col gap-unit mt-unit">
<button class="bg-primary text-on-primary font-headline-lg-mobile text-headline-lg-mobile py-3 rounded-DEFAULT btn-tactile glow-active w-full uppercase tracking-wider">
                Save Settings
            </button>
<button class="bg-surface text-on-surface font-label-mono text-label-mono py-3 rounded-DEFAULT btn-tactile-secondary w-full uppercase">
                Back to Game
            </button>
</footer>
</main>
<style>
        /* Custom Scrollbar for Settings Area if it gets too tall */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #050f1c; /* surface-container-lowest */
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #424754; /* outline-variant */
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #8c909f; /* outline */
        }
    </style>
</body></html>
